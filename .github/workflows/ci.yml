name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: kelly-engine — unit tests (paper fixtures)
        run: npm run test -w kelly-engine

      - name: kelly-engine — typecheck
        run: npm run typecheck -w kelly-engine

      - name: web — production build
        run: npm run build -w web
